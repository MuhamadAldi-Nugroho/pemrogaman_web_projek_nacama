<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk - NACAMA | Pembuat Kartu Nama Profesional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/Login.css" />
  </head>
  <body>
    <div class="main-container">
      <div class="grid-overlay"></div>

      <header>
        <div class="logo">
          <a href="index.html" style="text-decoration: none">
            <span class="main-logo">NACAMA</span>
          </a>
          <span class="sub-logo">NAME CARD MAKER</span>
        </div>
        <nav>
          <a href="#" class="nav-link">Template</a>
          <a href="#" class="nav-link">Masuk</a>
          <a href="#" class="btn-register">Daftar Gratis</a>
        </nav>
      </header>

      <main class="login-wrapper">
        <div class="login-header">
          <h1>Masuk ke Akun Anda</h1>
          <p>
            Silakan masukkan email dan kata sandi Anda untuk melanjutkan. Belum
            punya akun?
            <a href="index.html?register=open">Daftar di sini.</a>
          </p>
        </div>

        <div class="login-card">
          <form
            onsubmit="
              event.preventDefault();
              loginUser();
            "
          >
            <div class="input-group">
              <label for="email">Email Anda</label>
              <input
                type="email"
                id="email"
                placeholder="Email Anda"
                required
              />
            </div>

            <div class="input-group">
              <label for="password">Kata Sandi</label>
              <input
                type="password"
                id="password"
                placeholder="Kata Sandi"
                required
              />
            </div>

            <div class="form-options">
              <a href="#" class="forgot-password">Lupa Kata Sandi?</a>
            </div>

            <button type="submit" class="btn-login">Masuk</button>
            Belum punya akun?<a href="index.html?register=open"
              >Daftar di sini</a
            >
            </div>
          </form>
        </div>
      </main>

      <footer>
        <p>&copy; 2026 NACAMA. All rights reserved.</p>
        <div class="footer-links">
          <a href="#">Kebijakan Privasi</a>
        </div>
      </footer>
    </div>

    <script>
      function loginUser() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!email || !password) {
          alert("Email dan Password wajib diisi!");
          return;
        }

        fetch("http://localhost:3000/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            email,
            password,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            alert(data.message);

            // kalau login sukses
            if (data.status === "success") {
              localStorage.setItem("user", JSON.stringify(data.user));

              window.location.href = "index.html";
            }
          })
          .catch((err) => {
            alert("Server error");
            console.log(err);
          });
      }
    </script>


  </body>
</html>
