<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - NACAMA | Pembuat Kartu Nama Profesional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/Login.css">
</head>
<body>
    
    <div class="main-container">
        <div class="grid-overlay"></div>

        <header>
            <div class="logo">
                <span class="main-logo">NACAMA</span>
                <span class="sub-logo">NAME CARD MAKER</span>
            </div>
            <nav>
                <a href="#" class="nav-link">Template</a>
                <a href="#" class="nav-link">Masuk</a>
                <a href="#" class="btn-register">Daftar Gratis</a>
            </nav>
        </header>

        <main class="login-wrapper">
            <div class="login-header">
                <h1>Masuk ke Akun Anda</h1>
                <p>Silakan masukkan email dan kata sandi Anda untuk melanjutkan. Belum punya akun? <a href="#">Daftar di sini.</a></p>
            </div>

            <div class="login-card">
                <form action="#">
                    <div class="input-group">
                        <label for="email">Email Anda</label>
                        <input type="email" id="email" placeholder="Email Anda" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Kata Sandi</label>
                        <input type="password" id="password" placeholder="Kata Sandi" required>
                    </div>

                    <div class="form-options">
                        <a href="#" class="forgot-password">Lupa Kata Sandi?</a>
                    </div>

                    <button type="submit" class="btn-login">Masuk</button>
                </form>

                <div class="divider">
                    <span>Atau</span>
                </div>

                <div class="social-login">
                    <a href="#" class="social-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-10.986 0-.746-.08-1.32-.176-1.709H12.24z"/></svg>
                    </a>
                    <a href="#" class="social-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                    </a>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 NACAMA. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Kebijakan Privasi</a>
            </div>
        </footer>
    </div>

</body>
</html>
