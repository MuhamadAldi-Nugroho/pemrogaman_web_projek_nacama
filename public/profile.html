<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Profile - NACAMA</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/profile.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <a href="index.html" style="text-decoration: none">
          <span class="main-logo">NACAMA</span>
        </a>
        <span class="sub-logo">NAME CARD MAKER</span>
      </div>
    </header>
    <div class="profile-container">
      <!-- Banner -->
      <div class="profile-banner"></div>

      <!-- Header Profile -->
      <div class="profile-header">
        <div class="avatar" id="avatar">A</div>

        <h1 id="profileName">User Name</h1>

        <p id="profileJob">Professional Title</p>

        <div class="profile-actions">
          <button class="save-btn" onclick="saveProfile()">
            Simpan Perubahan
          </button>

          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>

      <!-- Content -->
      <div class="profile-grid">
        <!-- Personal -->
        <div class="card">
          <div class="card-title">
            <h2>Informasi Personal</h2>
            <span>Data akun pengguna</span>
          </div>

          <label>Nama Lengkap</label>
          <input type="text" id="name" placeholder="Masukkan nama lengkap" />

          <label>Email</label>
          <input type="email" id="email" placeholder="Masukkan email" />

          <label>Nomor Telepon</label>
          <input type="text" id="phone" placeholder="08xxxxxxxxxx" />
        </div>

        <!-- Professional -->
        <div class="card">
          <div class="card-title">
            <h2>Informasi Profesional</h2>
            <span>Identitas bisnis & pekerjaan</span>
          </div>

          <label>Jabatan</label>
          <input type="text" id="jobTitle" placeholder="Frontend Developer" />

          <label>Perusahaan</label>
          <input type="text" id="company" placeholder="Nama Perusahaan" />

          <label>Website</label>
          <input type="text" id="website" placeholder="https://website.com" />
        </div>
      </div>
    </div>

    <script src="js/profile.js"></script>
  </body>
</html>
