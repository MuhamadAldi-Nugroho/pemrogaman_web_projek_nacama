<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - NACAMA</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-box">

        <div class="auth-header">
            <h1>Buat Akun ✨</h1>
            <p>Daftar untuk mulai membuat kartu nama profesional</p>
        </div>

        <form class="auth-form">

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" placeholder="John Doe">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="nama@email.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Minimal 6 karakter">
            </div>

            <button type="submit" class="btn-primary">Daftar</button>

        </form>

        <div class="auth-footer">
            Sudah punya akun?
            <a href="Login.html">Masuk</a>
        </div>

    </div>

</div>

</body>
</html>
